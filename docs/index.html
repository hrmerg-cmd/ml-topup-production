// เปิด search bar
function openSearch() {
  searchWrapper.classList.add("active");
  searchInput.focus();
}

window.openSearch = openSearch;
function closeSearch(){
  searchWrapper.classList.remove("active"); // สำหรับ animation
    setTimeout(() => {
      searchWrapper.style.display = "";
      searchInput.value = "";
    }, 200); // ให้ animation จบก่อนปิด
}
window.closeSearch = closeSearch;


// กด Enter เพื่อค้นหา
document.addEventListener("DOMContentLoaded", function(){
  const input = document.getElementById("searchInput");

  input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      handleSearch();
    }
  });
});

// ปิดเมื่อกด ESC
document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    closeSearch();
  }
});

// Object เก็บข้อมูลสินค้าที่โหลดจาก Firestore
let allProducts = {};

// โหลดสินค้าทุกประเภทแล้วเก็บไว้
async function loadAllProducts() {
  const sections = [
    {id: "justForYou", tag: "just"},
    {id: "newProducts", tag: "ใหม่"},
    {id: "popularProducts", tag: "ยอดนิยม"},
    {id: "vouchersGrid", tag: "voucher"},
    {id: "directTopup", tag: "direct"}
  ];

  for (const sec of sections) {
    try {
      const docSnap = await db.collection("games").doc("main").get();
      if (!docSnap.exists) continue;
      const data = docSnap.data();
      
      // เก็บสินค้าแต่ละ section ลง allProducts
      Object.values(data).forEach(p => {
        // กรองตาม tag ของ section
        if(!p.tags || !p.tags.includes(sec.tag)) return;
        allProducts[p.name] = p;
      });

      // โหลดปกติ
      loadProducts(sec.id, sec.tag);

    } catch(err) {
      console.error("Error loading products for", sec.id, err);
    }
  }
}

// Live Search
const searchInput = document.getElementById("searchInput");
const resultsBox = document.getElementById("searchResults");

searchInput.addEventListener("input", () => {
  const keyword = searchInput.value.trim().toLowerCase();
  if(!keyword){
    resultsBox.innerHTML = "";
    return;
  }

  let html = "";
  let found = false;

  Object.values(allProducts).forEach(p => {
    if(p.name.toLowerCase().includes(keyword)){
      found = true;
      html += `
        <div class="search-item card mb-2 p-2 d-flex align-items-center" onclick="window.location.href='${p.link || "#"}'">
          <img src="${p.image}" alt="${p.name}" style="width:60px;height:60px;object-fit:cover;margin-right:10px;">
          <div>
            <div>${p.name}</div>
            <div class="text-muted">${p.price} LAK</div>
          </div>
        </div>
      `;
    }
  });

  if(!found) html = "❌ ไม่พบสินค้า";

  resultsBox.innerHTML = html;
});

// เรียกตอนโหลดหน้า
loadAllProducts();


function handleSearch(){
  const keyword = document.getElementById("searchInput").value.trim();

  if(!keyword){
    alert("กรุณากรอกคำค้นหา");
    return;
  }

  window.location.href = 
    "searchResults.html?q=" + encodeURIComponent(keyword);
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app); // ✅ ต้องมีบรรทัดนี้

window.handleSearch = handleSearch;




// ===== Handle Login/Register =====
  
// เรียกหลัง DOM โหลดเสร็จ
// ฟังก์ชันกลาง handleLogin
function handleLogin() {
  const loginBtn = document.getElementById("loginBtn");
  if (!loginBtn) return;

  const user = auth.currentUser; // ตรวจสอบผู้ใช้ปัจจุบัน

  if (user) {
    // ถ้า login แล้ว → logout
    signOut(auth).then(() => {
      alert("ออกจากระบบเรียบร้อย");
      loginBtn.innerText = "Login";
    }).catch((err) => {
      alert("เกิดข้อผิดพลาด: " + err.message);
    });
  } else {
    // ยังไม่ได้ login → ไปหน้า login.html
    window.location.href = "Login.html";
  }
}

// รอ DOM โหลดก่อน
document.addEventListener("DOMContentLoaded", () => {
  const loginBtn = document.getElementById("loginBtn");
  const pointsBox = document.getElementById("pointsBox");

  if(!loginBtn) return; // ป้องกัน null

  // ตรวจสอบสถานะผู้ใช้
  onAuthStateChanged(auth, async (user) => {
    if(user){
      loginBtn.innerText = "My Account"; // เปลี่ยนปุ่ม
      
      // โหลดคะแนนจาก Firestore
      try{
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);
        const points = docSnap.exists() ? docSnap.data().points || 0 : 0;
        pointsBox.innerText = "แต้มสะสม: " + points;
      }catch(err){
        console.error("Error fetching points:", err);
        pointsBox.innerText = "แต้มสะสม: 0";
      }

    } else {
      loginBtn.innerText = "Login";
      pointsBox.innerText = "";
    }
  });

  // กำหนด event listener
  loginBtn.addEventListener("click", async () => {
    const user = auth.currentUser;

    if(user){
      try{
        await signOut(auth);
        alert("ออกจากระบบเรียบร้อย");
        loginBtn.innerText = "Login";
        pointsBox.innerText = "";
      }catch(err){
        alert("เกิดข้อผิดพลาด: " + err.message);
      }
    } else {
      // ไปหน้า login
      window.location.href = "Login.html";
    }
  });
});





async function rewardPoints(price){
  if(!currentUser) return;

  const earned = Math.floor(price / 1000); // 1 แต้ม = 1000₭
  userPoints += earned;

  await db.collection("users").doc(currentUser).update({
    points: userPoints
  });

  document.getElementById("pointsBox").innerText = "แต้มสะสม: " + userPoints;
}

rewardPoints(80000); // เช่น เติม 80,000₭ ได้ 80 แต้ม

    if(data.social && Array.isArray(data.social)){
      socialHtml = data.social.map(s => `<a href="${s.url}" class="me-2"><i class="${s.iconClass}"></i></a>`).join("");
    }

  // ===== LOAD ABOUT =====
  async function loadAbout() {

      console.log("ไม่พบ about document");
      return;
    }

    const abouts = docSnap.data(); // { about1:{...}, about2:{...}, ... }

    let html = "";
    Object.keys(abouts).forEach(key => {
      const item = abouts[key];
      html += `
        <div class="about-wrapper mb-4">
          <div class="about-image">
            ${item.image ? `<img src="${item.image}" alt="About">` : ""}
          </div>
          <div class="about-content">
            <h3>${item.name || ""}</h3>
            <p>${item.description || ""}</p>
           ${item.button === true && item.buttonText ? 
              `<a href="${item.buttonLink || '#'}" class="about-btn">
                ${item.buttonText}
              </a>` : ""}
          </div>
        </div>
      `;
    });

    document.getElementById("aboutContent").innerHTML = html;

  } catch(error){
    console.error("Error loading about:", error);
    document.getElementById("aboutContent").innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
  }
}
  // ===== LOAD SLIDER =====
  async function loadSlider() {
    const docSnap = await db.collection("slides").doc("main").get();
    if(!docSnap.exists) return console.log("ไม่พบ slides");
    const slides = docSnap.data().slides || [];
    let html = "";
    slides.forEach((s,i) => {
      html += `<div class="carousel-item ${i===0?'active':''}">
                 <img src="${s.image}" class="d-block  w-100 rounded">
               </div>`;
    });
    document.getElementById("sliderContainer").innerHTML = html;
    // Auto-slide 5 sec
    const carousel = new bootstrap.Carousel(document.getElementById('mainSlider'), { interval: 40000 });
  }

  // ===== LOAD PRODUCTS =====
  async function loadProducts(sectionId, filterTag=null){
  try{
    const docSnap = await db.collection("games").doc("main").get();
    if(!docSnap.exists) return console.log("ไม่พบเอกสาร games/main");

    const data = docSnap.data();
    let html = "";

    for(const key in data){
      const p = data[key];

      // กรองตาม tag ถ้ามี
      if(filterTag && (!p.tags || !p.tags.includes(filterTag))) continue;

      let finalPrice = p.price;
      if(p.discountPercent && p.discountPercent > 0){
        finalPrice = Math.round(p.price * (1 - p.discountPercent/100));
      }

      let tagsHtml = "";
      if(p.tags && Array.isArray(p.tags)){
        p.tags.forEach(tag => tagsHtml += `<span class="badge bg-primary">${tag}</span>`);
      }

      // กำหนด class สำหรับ card
      let cardClass = "card mb-3";
      if(p.updating) cardClass += " disabled-card";

      html += `
        <div class="${cardClass}">
          <img src="${p.image}" class="card-img-top">
          <div class="card-body">
            <h5 class="card-title">${p.name}</h5>
            <div class="mb-2">
              ${p.discountPercent && p.discountPercent>0 
                ? `<span class="text-decoration-line-through text-muted">${p.price} LAK</span>
                   <span class="fw-bold text-danger">${finalPrice} LAK</span>
                   <span class="badge bg-danger">${p.discountPercent}% OFF</span>`
                : `<span class="fw-bold">${p.price} LAK</span>`}
            </div>
            <div>${tagsHtml}</div>
            ${p.updating ? `<div class="text-danger fw-bold mt-2">ระบบกำลังปรับปรุงชั่วคราว</div>` : ""}
          </div>
        </div>
      `;
    }

    document.getElementById(sectionId).innerHTML = html;

    // เพิ่ม onclick หลัง render
    document.querySelectorAll(`#${sectionId} .card`).forEach((card, index)=>{
      const key = Object.keys(data)[index];
      const p = data[key];
      if(!p.updating && p.link){
        card.onclick = ()=>{
          window.location.href = p.link; // ไปตาม link ใน DB
        };
      } else if(p.updating){
        card.onclick = ()=>{
          alert("ระบบกำลังปรับปรุงชั่วคราว");
        };
      }
    });

  }catch(err){
    console.error("Error loading products:", err);
  }
}

  // ===== INIT =====
  loadHeader();

  loadProducts("directTopup", "direct");
</script>
